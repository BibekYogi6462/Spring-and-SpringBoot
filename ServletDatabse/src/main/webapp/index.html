<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Database Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #45a049;
        }
        .note {
            color: #666;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Database Demo</h1>
        <p>Click the button below to view all student records from the database.</p>
        <a href="StudentListServlet" class="button">View Student List</a>
        <div class="note">
            Make sure your database is running and has the students table.
        </div>
    </div>
</body>
</html>
